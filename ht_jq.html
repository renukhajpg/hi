<!DOCTYPE html>
<html>
<head>
    <title>jQuery Lab Task</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        .panel { padding: 50px; display: none; background-color: #e5eecc; border: solid 1px #c3c3c3; text-align: center; }
        #box { width: 100px; height: 100px; background: red; position: relative; margin-top: 20px; }
        .container { width: 80%; margin: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h2>jQuery Dynamic Effects</h2>
        <button id="flip">Click to Slide Panel</button>
        <div class="panel">Hello! This is a hidden panel revealed by jQuery.</div>
        
        <hr>
        <button id="animateBtn">Start Animation</button>
        <button id="stopBtn">Stop</button>
        <div id="box"></div>

        <script>
            $(document).ready(function(){
                // Slide Toggle
                $("#flip").click(function(){
                    $(".panel").slideToggle("slow");
                });

                // Animation Logic
                $("#animateBtn").click(function(){
                    var div = $("#box");
                    div.animate({left: '200px', opacity: '0.5'}, "slow");
                    div.animate({width: '200px', opacity: '0.8'}, "slow");
                    div.animate({height: '200px', opacity: '0.4'}, "slow");
                    div.animate({left: '0px', width: '100px', height: '100px', opacity: '1'}, "slow");
                });

                $("#stopBtn").click(function(){
                    $("#box").stop(true);
                });
            });
        </script>
    </div>
</body>
</html>
